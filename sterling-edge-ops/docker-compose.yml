services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sterling
      POSTGRES_PASSWORD: sterling_secure_2024
      POSTGRES_DB: sterling_edge_ops
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sterling -d sterling_edge_ops"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://sterling:sterling_secure_2024@db:5432/sterling_edge_ops
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-run-openssl-rand-base64-32}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
